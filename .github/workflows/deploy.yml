name: Deploy to Pi
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            rsync -avz --exclude=.git --exclude=__pycache__ --exclude=.env --exclude=.wp_app_pass erico@192.168.1.116:/opt/godbot/automation/ /home/erico/automation/
            echo "Deployed to Pi"
